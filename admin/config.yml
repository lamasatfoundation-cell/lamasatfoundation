backend:
  name: github
  repo: lamasatfoundation-cell/lamasat-foundation.github.io
  branch: main
  base_url: https://lamasatfoundation-cell.github.io
  auth_endpoint: api/auth

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}
